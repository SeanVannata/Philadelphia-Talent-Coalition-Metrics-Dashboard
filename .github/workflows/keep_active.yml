name: Keep Streamlit App Active

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: curl -s -o /dev/null -w "%{http_code}\n" https://philadelphia-talent-coalition-metrics-dashboard.streamlit.app/
